<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oleo+Script&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>



<script>
window.addEventListener("scroll", function () {
  const header = document.querySelector("header");

  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});

const scrollArrow = document.querySelector('.scroll-arrow');

window.addEventListener('scroll', function() {
  if (window.scrollY > 80) {
    scrollArrow.classList.add('hidden');
  } else {
    scrollArrow.classList.remove('hidden');
  }
});
</script>

<body class="page-home">

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark text-white">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ "/" | relative_url }}">{{ site.title }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"> 
          <span class="navbar-toggler-icon"></span>
        </button>  
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ "/" | relative_url }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if page.url == '/profile/' %}active{% endif %}" href="{{ "/profile/" | relative_url }}">Profile</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if page.url == '/projects/' %}active{% endif %}" href="{{ "/projects/" | relative_url }}">Portfolio</a>
            </li> 
              <li class="nav-item">
                <a class="nav-link" href="#site-footer">Contact</a>
              </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

<section class="hero">
  <div class="video-wrapper">
    <video autoplay muted loop playsinline id="bg-video">
      <source src="{{ "/assets/videos/bgWalk4.mp4" | relative_url }}" type="video/mp4">    
    </video>
  </div>

  <div class="hero-content">
    {{ content }}
  </div>

<div class="scroll-arrow">
  <i class="bi bi-chevron-down"></i>
</div>

  <section class="page-banners">
  <a href="{{ "/profile/" | relative_url }}" class="banner-card">
    <div class="banner-inner">
      <span class="banner-label">Profile</span>
      <span class="banner-arrow">→</span>
    </div>
  </a>
  <a href="{{ "/projects/" | relative_url }}" class="banner-card">
    <div class="banner-inner">
      <span class="banner-label">Portfolio</span>
      <span class="banner-arrow">→</span>
    </div>
  </a>
</section>


<footer class="footer navbar-dark text-white" id="site-footer">
  <div class="container footer-inner">
    <span class="footer-copyright">&copy; 2026 {{ site.name }}</span>
    <div class="footer-contact">
<span class="footer-contact-arrow">➤ </span>
      <a href="mailto:sharma.gregory@gmail.com">sharma.gregory@gmail.com</a>
      <span>+1 (518) 309-8489</span>
    </div>
  </div>
</footer>

</section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
